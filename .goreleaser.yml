---
version: 2

project_name: gosimac

release:
  github:
    owner: 1995parham
    name: gosimac

builds:
  - binary: gosimac
    main: .
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/1995parham/gosimac/internal/cmd.version={{.Version}}
      - -X github.com/1995parham/gosimac/internal/cmd.commit={{.ShortCommit}}
      - -X github.com/1995parham/gosimac/internal/cmd.date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: binary
    formats:
      - binary
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

homebrew_casks:
  - name: gosimac
    binaries:
      - gosimac
    repository:
      owner: 1995parham
      name: homebrew-tap
    description: "Fetch the wallpaper from Bings, Unsplash ..."
